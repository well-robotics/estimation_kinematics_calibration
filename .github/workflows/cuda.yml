name: CUDA subproject

on:
  push:
    paths:
      - "cuda/**"
      - ".github/workflows/cuda.yml"
  pull_request:
    paths:
      - "cuda/**"
      - ".github/workflows/cuda.yml"

jobs:
  cpu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: cuda
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest tests -m "not external_data and not release_cuda"
      - name: Build
        run: |
          python -m build
          python -m twine check dist/*
      - name: Installed wheel smoke
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python -m pip check
          python -c "from estimation_calibration_cuda import CalibrationConfig, CalibrationEpisode, CalibrationResult, load_dataset, calibrate, evaluate"
          estimation-calibration-cuda train example -o wheel-run --device cpu --compile none --epochs 1 --chunk 32
          estimation-calibration-cuda evaluate example --checkpoint wheel-run/checkpoint.pt --device cpu
          estimation-calibration-cuda inspect wheel-run
